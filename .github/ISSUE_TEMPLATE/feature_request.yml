name: Feature Request
description: 提出一个功能建议或产品改进想法
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 你要解决的问题
      description: 这个需求是为了解决什么问题？
      placeholder: 例如：当前商品详情页缺少卖家信用信息，买家难以判断可信度
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 你的建议方案
      description: 你希望怎么实现或改进？
      placeholder: 例如：在商品详情页增加卖家评分、成交数和历史评价摘要
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 影响范围
      description: 会影响哪些页面、接口或模块？
      placeholder: 例如：商品详情页、用户评价接口、卖家信息模块

  - type: dropdown
    id: mvp
    attributes:
      label: 是否属于当前 MVP 范围
      options:
        - 是，建议优先考虑
        - 否，可放入后续阶段
        - 不确定
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 可以补充竞品参考、草图链接、接口想法等

