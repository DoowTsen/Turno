name: Bug Report
description: 报告一个问题，帮助改进 Turno
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要描述你遇到的问题
      placeholder: 例如：发布商品后页面提示成功，但列表中没有显示
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请尽量写清楚具体步骤
      placeholder: |
        1. 打开某个页面
        2. 点击某个按钮
        3. 输入某些内容
        4. 出现问题
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期结果
      placeholder: 例如：商品应成功出现在我的商品列表中
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      placeholder: 例如：页面提示成功，但列表没有变化
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志 / 报错 / 截图
      description: 可粘贴报错信息、接口响应、终端日志或截图说明
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      placeholder: |
        - OS:
        - Node.js:
        - Go:
        - MySQL:
        - Redis:
        - Browser:

